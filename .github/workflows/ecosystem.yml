name: Ecosystem

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ecosystem:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Installs
        run: uv sync --locked --all-extras --dev --no-install-project

      - name: Install pip  # TODO(cnpryer): --seed
        run: uv pip install pip --upgrade

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release

      - name: Run ecosystem tests
        id: ecosystem
        run: |
          WHEEL=$(ls target/wheels/httprs-*.whl | head -1)
          OUTPUT=$(uv run --no-sync python check_ecosystem.py \
            --httprs-wheel "$WHEEL" \
            --timeout 180 \
            --concurrency 2)
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post ecosystem results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ECOSYSTEM_OUTPUT: ${{ steps.ecosystem.outputs.output }}
        with:
          script: |
            const marker = '<!-- ecosystem-results -->';
            const output = process.env.ECOSYSTEM_OUTPUT;
            const sha = context.sha.substring(0, 7);
            const body = `${marker}\n## Ecosystem Tests\n\n_Commit: ${sha}_\n\n${output}\n`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
