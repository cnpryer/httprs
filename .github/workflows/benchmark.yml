name: Benchmark

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Installs
        run: uv sync --locked --all-extras --dev --no-install-project

      - name: Install pip
        run: uv pip install pip --upgrade

      - name: Build (release)
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release

      - name: Run benchmarks
        id: benchmark
        run: |
          OUTPUT=$(uv run --no-sync --with httpx --with requests benchmark.py --packages httpx requests -n 5000)
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post benchmark results
        uses: actions/github-script@v7
        env:
          BENCHMARK_OUTPUT: ${{ steps.benchmark.outputs.output }}
        with:
          script: |
            const marker = '<!-- benchmark-results -->';
            const output = process.env.BENCHMARK_OUTPUT;
            const sha = context.sha.substring(0, 7);
            const body = `${marker}\n## Benchmark Results\n\n_Commit: ${sha}_\n\n\`\`\`\n${output}\n\`\`\`\n`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
